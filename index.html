<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <!-- Chessboard stylesheet -->
    <link
      rel="stylesheet"
      href="node_modules/@chrisoakman/chessboardjs/dist/chessboard-1.0.0.min.css"
    />

    <!-- Rest of site stylesheet -->
    <link rel="stylesheet" href="styles.css" />

    <!-- Web version of Jquery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script defer src="js/chess.js"></script>

    <!-- Local version of chessboard -->
    <script src="node_modules/@chrisoakman/chessboardjs/dist/chessboard-1.0.0.js"></script>
    <script
      defer
      src="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/js/bootstrap.bundle.min.js"
      integrity="sha384-6khuMg9gaYr5AxOqhkVIODVIvm9ynTT5J4V1cfthmT+emCG6yVmEZsRHdxlotUnm"
      crossorigin="anonymous"
    ></script>
    <!-- <script defer type="module" src="startChess.js"></script> -->
    <script defer src="js/main.js"></script>
  </head>

  <body>
    <div class="container">
      <div id="myBoard"></div>
      <div class="info">
        <div class="header">
          <h1 class="game-stats-h1">Game</h1>
        </div>
        <div class="status-container">
          <div id="status"></div>
        </div>
        <div class="FEN-container">
          <div id="fen"></div>
        </div>
        <div class="PGN-container">
          <div id="pgn"></div>
        </div>

        <div class="footer">
          <div class="start">
            <button class="btn btn-success" id="compVsCompBtn">
              Start Computer vs Computer
            </button>
          </div>

          <div class="top-button"></div>

          <div class="bottom-buttons">
            <button id="resetBtn">&#8634;</button>
            <button id="flip">
              <img src="img/icons8-sorting-arrows-horizontal-64.png" />
            </button>
            <button id="undoBtn">&#x21A9;</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
